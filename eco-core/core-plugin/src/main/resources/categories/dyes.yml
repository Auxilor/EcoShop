item: lime_dye name:"&aDyes"
lore: [ ]

dynamic-pricing:
  enabled: false
  max-increase: 1.5 # Cap at 150% of base price
  max-decrease: 0.5 # Floor at 50% of base price

  decay:
    enabled: false # Whether decay is active for this category
    rate: 0.0    # Decay rate per period (0.0 = disabled, 0.1 = 10% per period)
    period: 1440 # Period in minutes (default: 1440 = 24 hours)

  buy:
    enabled: true
    formula: "%base_price% * (1 + 0.0781 * log(1 + max(%buys% - %sells%, 0)) - 0.0781 * log(1 + max(%sells% - %buys%, 0)))"

  alt-buy:
    enabled: true
    formula: "%base_price% * (1 + 0.0781 * log(1 + max(%buys% - %sells%, 0)) - 0.0781 * log(1 + max(%sells% - %buys%, 0)))"

  sell:
    enabled: true
    formula: "%base_price% * (1 + 0.0781 * log(1 + max(%buys% - %sells%, 0)) - 0.0781 * log(1 + max(%sells% - %buys%, 0)))"

gui:
  rows: 4
  title: "Dyes (%page%/%max_page%)"

  page-change-sound:
    enabled: true
    sound: ui.button.click
    pitch: 1.0
    volume: 1.0

  forwards-arrow:
    item: arrow name:"&fNext Page"
    item-inactive: gray_dye name:"&7Next Page"
    row: 4
    column: 6
  backwards-arrow:
    item: arrow name:"&fPrevious Page"
    row: 4
    column: 4

  pages:
    - page: 1
      mask:
        items:
          - gray_stained_glass_pane
          - black_stained_glass_pane
        pattern:
          - "222222222"
          - "211111112"
          - "211111112"
          - "222222222"

items:
  - id: black_dye

    buy:
      value: 25
      type: coins
      display: "$%value%"

    sell:
      value: 2
      type: coins
      display: "$%value%"

    item: black_dye

    gui:
      column: 1
      row: 1
      page: 1

